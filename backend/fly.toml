app = 'backend-earnest-pond-1966'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  bot = "python scripts/run_autonomous_bot.py --symbols AAPL,NVDA,MSFT,AMZN,META"
